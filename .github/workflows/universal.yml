name: Universal Workflow

on:
  workflow_dispatch:
  schedule:
    # Runs 4 times in one day, once every two weeks, and twice a month
    - cron: "0 0,6,12,18 * * *"       # every 6 hours (4x per day)
    - cron: "0 0 * * 0"               # once per week (Sunday at midnight, covers biweekly too)
    - cron: "0 0 1,15 * *"            # 2x a month (1st & 15th)

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  repo-healer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Repo Healer (create missing files)
        run: |
          python3 <<'EOF'
          import pathlib
          defaults = {
            "requirements.txt": "# Python deps\nFlask\nSQLAlchemy\n",
            "package.json": '{ "name": "app", "version": "1.0.0" }',
            "Dockerfile": "FROM python:3.11-slim\nWORKDIR /app\nCOPY . .\nRUN pip install -r requirements.txt\nCMD [\"python\", \"app.py\"]",
            ".env.example": "SECRET_KEY=changeme\nDATABASE_URL=sqlite:///app.db\n"
          }
          for fname, content in defaults.items():
              if not pathlib.Path(fname).exists():
                  with open(fname, "w") as f:
                      f.write(content)
          print("✅ Repo Healer ensured core files")
          EOF

      - name: Commit Healer Fixes
        run: |
          git config user.name "repo-healer[bot]"
          git config user.email "repo-healer[bot]@users.noreply.github.com"
          git add .
          git diff-index --quiet HEAD || git commit -m "🛠 Repo Healer applied fixes"
          git push || echo "No healer fixes to push"

  autofix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [python, node]
    steps:
      - uses: actions/checkout@v3

      # --- Python ---
      - name: Setup Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python Deps
        if: matrix.language == 'python'
        run: pip install -U pip flake8 pylint black safety pytest pip-tools

      - name: Lint & Format Python
        if: matrix.language == 'python'
        run: |
          flake8 . || true
          pylint **/*.py || true
          black . --quiet

      - name: Security Scan Python
        if: matrix.language == 'python'
        run: safety check || true

      - name: Upgrade Python Deps
        if: matrix.language == 'python'
        run: |
          if [ -f requirements.in ]; then pip-compile --upgrade; fi

      # --- Node.js ---
      - name: Setup Node
        if: matrix.language == 'node'
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install Node Deps
        if: matrix.language == 'node'
        run: npm install || true

      - name: Lint & Format Node
        if: matrix.language == 'node'
        run: |
          npx eslint . --fix || true
          npx prettier --write . || true

      - name: Security Audit Node
        if: matrix.language == 'node'
        run: |
          npm audit fix || true
          npm audit fix --force || true

      - name: Commit Autofixes
        run: |
          git config user.name "autofix[bot]"
          git config user.email "autofix[bot]@users.noreply.github.com"
          git add .
          git diff-index --quiet HEAD || git commit -m "🤖 Auto-fixes applied"
          git push || echo "No autofixes to push"

  dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # Python Dependency Updates
      - name: Update Python Deps
        if: hashFiles('**/requirements*.txt') != ''
        run: |
          pip install -U pip pip-tools safety
          if [ -f requirements.in ]; then
            pip-compile --upgrade
          elif [ -f requirements.txt ]; then
            pip install -r requirements.txt
            pip freeze > requirements.txt
          fi
          safety check || true

      - name: Commit Python Updates
        if: hashFiles('**/requirements*.txt') != ''
        run: |
          git config user.name "deps-bot"
          git config user.email "deps-bot@users.noreply.github.com"
          git add requirements*.txt
          git diff-index --quiet HEAD || git commit -m "⬆️ Python deps updated"
          git push || echo "No Python updates"

      # Node.js Dependency Updates
      - name: Update Node Deps
        if: hashFiles('**/package.json') != ''
        run: |
          npm install -g npm-check-updates
          ncu -u || true
          npm install || true
          npm audit fix || true
          npm audit fix --force || true

      - name: Commit Node Updates
        if: hashFiles('**/package.json') != ''
        run: |
          git config user.name "deps-bot"
          git config user.email "deps-bot@users.noreply.github.com"
          git add package.json package-lock.json
          git diff-index --quiet HEAD || git commit -m "⬆️ Node deps updated"
          git push || echo "No Node updates"

      # Docker Vulnerability Scan
      - name: Docker Scan
        if: hashFiles('**/Dockerfile') != ''
        uses: aquasecurity/trivy-action@0.14.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0
          format: table
          output: trivy-report.txt

      - name: Upload Docker Report
        if: hashFiles('**/Dockerfile') != ''
        uses: actions/upload-artifact@v3
        with:
          name: docker-vuln-report
          path: trivy-report.txt

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript', 'python' ]
    steps:
      - uses: actions/checkout@v3
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
