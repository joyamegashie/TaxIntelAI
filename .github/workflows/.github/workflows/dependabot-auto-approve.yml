name: Dependabot auto-approve and cleanup

on:
  pull_request:
    types: [opened, synchronize, reopened]

  schedule:
    - cron: "0 0 * * *" # once a day at midnight UTC, cleanup job runs

permissions:
  pull-requests: write
  contents: write
  checks: read

jobs:
  approve:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Ensure PR checks have passed
        id: checks
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const { data: checks } = await github.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha,
            });
            const allPassed = checks.check_runs.every(c => c.conclusion === "success");
            if (!allPassed) {
              core.setFailed("Not all checks have passed — skipping auto-approve.");
            }

      - name: Auto-approve Dependabot PR
        if: success()
        run: gh pr review ${{ github.event.pull_request.number }} --approve
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Close stale Dependabot PRs
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pulls } = await github.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
            });

            const now = new Date();
            const cutoff = 7 * 24 * 60 * 60 * 1000; // 7 days in ms

            for (const pr of pulls) {
              if (pr.user.login === "dependabot[bot]") {
                const updatedAt = new Date(pr.updated_at);
                if (now - updatedAt > cutoff) {
                  await github.pulls.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pr.number,
                    state: "closed",
                  });
                  console.log(`Closed stale Dependabot PR #${pr.number}`);
                }
              }
            }
